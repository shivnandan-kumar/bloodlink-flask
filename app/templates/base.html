<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>{% block title %}BloodLink{% endblock %}</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
        <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    </head>
    <body>
        <nav class="navbar navbar-expand-lg bg-white border-bottom">
            <div class="container">
                <a class="navbar-brand fw-bold text-danger" href="{{ url_for('main.home') }}">BloodLink</a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNavbar" aria-controls="mainNavbar" aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="mainNavbar">
                    <div class="navbar-nav ms-auto align-items-lg-center gap-lg-2">
                        {% if current_user.is_authenticated %}
                            <span class="navbar-text">Hello, {{ current_user.name }}</span>
                            <form method="post" action="{{ url_for('auth.logout') }}">
                                <button class="btn btn-outline-danger" type="submit">Logout</button>
                            </form>
                        {% else %}
                            <a class="nav-link" href="{{ url_for('auth.login') }}">Login</a>
                            <a class="btn btn-danger" href="{{ url_for('auth.register') }}">Register</a>
                        {% endif %}
                    </div>
                </div>
            </div>
        </nav>

        <main>
            <div class="container pt-3">
                {% with messages = get_flashed_messages(with_categories=true) %}
                    {% for category, message in messages %}
                        <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
                            {{ message }}
                            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                        </div>
                    {% endfor %}
                {% endwith %}
            </div>
            {% block content %}{% endblock %}
        </main>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    </body>
</html>
