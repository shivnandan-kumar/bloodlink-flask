{% extends "base.html" %}

{% block title %}Login | BloodLink{% endblock %}
{% block body_class %}auth-page{% endblock %}

{% block content %}
<section class="auth-shell">
    <div class="auth-visual" aria-hidden="true"></div>
    <div class="auth-content">
        <div class="auth-content-inner">
            <p class="section-kicker">Welcome back</p>
            <h1>Login to BloodLink</h1>
            <p class="auth-intro">Continue to your account and activity.</p>

        <form method="post" class="auth-form mt-4">
            <div class="mb-3">
                <label class="form-label" for="email">Email address</label>
                <input class="form-control" id="email" name="email" type="email" value="{{ request.form.get('email', '') }}" maxlength="120" required autofocus>
            </div>
            <div class="mb-3">
                <label class="form-label" for="password">Password</label>
                <input class="form-control" id="password" name="password" type="password" required>
            </div>
            <div class="form-check mb-4">
                <input class="form-check-input" id="remember" name="remember" type="checkbox">
                <label class="form-check-label" for="remember">Remember me</label>
            </div>
            <button class="btn btn-blood w-100" type="submit">Login</button>
        </form>

        <p class="text-center text-secondary mt-3 mb-0">
            New to BloodLink? <a href="{{ url_for('auth.register') }}">Create an account</a>
        </p>
        </div>
    </div>
</section>
{% endblock %}
